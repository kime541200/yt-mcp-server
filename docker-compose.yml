services:
  # Reverse proxy — 改寫 Host header 讓前端 (或 MCP Client) 透過外部 IP 時能正確處理 SSE 連線
  nginx:
    image: nginx:alpine
    container_name: yt-mcp-nginx
    ports:
      - "8088:8088"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  yt-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: yt-mcp-server:latest
    container_name: yt-mcp-server
    networks:
      default:
        aliases:
          - youtube
    env_file:
      - .env
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8088
    volumes:
      # 掛載設定檔方便隨時從外部修改
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
